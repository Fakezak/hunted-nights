<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NIGHT SHIFT</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; display: flex; justify-content: center; align-items: center; background-color: #111; transition: background 0.2s; }
        
        /* UI Elements */
        #hud { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; text-align: right; z-index: 10; text-shadow: 2px 2px 0 #000; }
        .btn { position: absolute; bottom: 20px; padding: 15px 30px; background: rgba(50, 0, 0, 0.7); border: 2px solid #550000; color: red; font-size: 1.2rem; cursor: pointer; font-family: inherit; z-index: 10; }
        .btn:hover { background: red; color: black; }
        
        #btn-cctv { left: 20px; }
        #btn-move { right: 20px; }

        /* Overlays */
        #cctv-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px), radial-gradient(circle, #333 0%, #000 100%); z-index: 5; }
        #cctv-text { position: absolute; top: 50px; left: 50px; font-size: 2rem; color: #fff; opacity: 0.7; }
        
        #message-box { position: absolute; bottom: 100px; width: 80%; text-align: center; font-size: 1.5rem; z-index: 15; color: #fff; }

        .flicker { animation: flicker 0.5s infinite alternate; }
        @keyframes flicker { 0% { opacity: 1; } 50% { opacity: 0.1; } 100% { opacity: 0.8; } }
    </style>
</head>
<body>

<audio id="scary-voice" src="iseeyou.mp3"></audio>

<div id="game-container">
    <div id="hud">
        <div id="day-display">Day: 1</div>
        <div id="time-display">12:00 AM</div>
    </div>

    <div id="message-box">You are in the Security Booth. Watch the cameras.</div>

    <div id="cctv-overlay">
        <div id="cctv-text">CAM 01 - MAIN ENTRANCE<br><br><span id="cctv-feed">Nothing to report.</span></div>
    </div>

    <button id="btn-cctv" class="btn">Open CCTV</button>
    <button id="btn-move" class="btn">Go to Bathroom</button>
</div>

<script>
    let currentDay = 1;
    let inBathroom = false;
    let cctvOpen = false;
    let day2Triggered = false;

    const container = document.getElementById('game-container');
    const msgBox = document.getElementById('message-box');
    const cctvOverlay = document.getElementById('cctv-overlay');
    const cctvFeed = document.getElementById('cctv-feed');
    const dayDisplay = document.getElementById('day-display');
    const scaryVoice = document.getElementById('scary-voice');

    // Button Logic
    document.getElementById('btn-cctv').addEventListener('click', toggleCCTV);
    document.getElementById('btn-move').addEventListener('click', moveLocation);

    function toggleCCTV() {
        if (inBathroom) {
            msgBox.innerText = "You can't check cameras from the bathroom.";
            return;
        }
        cctvOpen = !cctvOpen;
        if (cctvOpen) {
            cctvOverlay.style.display = 'block';
            document.getElementById('btn-cctv').innerText = "Close CCTV";
            checkCameras();
        } else {
            cctvOverlay.style.display = 'none';
            document.getElementById('btn-cctv').innerText = "Open CCTV";
        }
    }

    function moveLocation() {
        if (cctvOpen) return; // Can't move while looking at monitor

        inBathroom = !inBathroom;
        if (inBathroom) {
            document.getElementById('btn-move').innerText = "Return to Booth";
            msgBox.innerText = "You are in the cold, dirty bathroom.";
            container.style.backgroundColor = "#050505"; // Darker room
            
            if (currentDay === 2 && !day2Triggered) {
                triggerJumpscare();
            }
        } else {
            document.getElementById('btn-move').innerText = "Go to Bathroom";
            msgBox.innerText = "You are back in the Security Booth.";
            container.style.backgroundColor = "#111";
        }
    }

    function checkCameras() {
        if (currentDay === 1) {
            cctvFeed.innerText = "A janitor walks by. Everything is normal.";
            // Advance to Day 2 after checking cameras on Day 1
            setTimeout(() => {
                currentDay = 2;
                dayDisplay.innerText = "Day: 2";
                msgBox.innerText = "6:00 AM. Shift over. \n\n...Starting next shift.";
            }, 3000);
        } else if (currentDay === 2) {
            cctvFeed.innerHTML = "<span style='color:red;'>Someone is standing in the hallway. They are bleeding. You need to hide. Go to the bathroom.</span>";
        }
    }

    function triggerJumpscare() {
        day2Triggered = true;
        msgBox.innerText = "You grab the mop. Suddenly...";
        
        setTimeout(() => {
            // Light flicker effect
            container.classList.add('flicker');
            
            setTimeout(() => {
                // Pitch black
                container.classList.remove('flicker');
                container.style.backgroundColor = "#000";
                document.getElementById('hud').style.display = 'none';
                document.getElementById('btn-cctv').style.display = 'none';
                document.getElementById('btn-move').style.display = 'none';
                
                msgBox.style.color = "red";
                msgBox.innerText = "Don't turn around.";
                
                // Play your custom audio file
                scaryVoice.play();

            }, 1500);
        }, 2000);
    }
</script>
</body>
</html>
