<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D NIGHT SHIFT</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #blocker { position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; mix-blend-mode: difference; }
    </style>
</head>
<body>

<div id="blocker">
    <h1>NIGHT SHIFT 3D</h1>
    <p>Click to start. Use WASD to walk. Mouse to look.</p>
</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>
    let camera, scene, renderer, controls;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let prevTime = performance.now();
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    
    // Head bobbing variables
    let headBobTimer = 0;

    // Your Audio File (Updated with exact name)
    const scaryAudio = new Audio('I See You.mp3');

    init();
    animate();

    function init() {
        // 1. Setup Scene and Camera
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 0, 15); // Adds creepy darkness in the distance

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6; // Player height

        // 2. Setup Lighting
        const light = new THREE.PointLight(0x555555, 1, 10);
        light.position.set(0, 3, 0);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x111111));

        // 3. Build the 3D Room (Placeholder blockout)
        const floorGeometry = new THREE.PlaneGeometry(20, 20);
        const floorMaterial = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // A Red "CCTV Monitor" to interact with
        const monitorGeo = new THREE.BoxGeometry(1, 1, 1);
        const monitorMat = new THREE.MeshPhongMaterial({ color: 0x550000 });
        const monitor = new THREE.Mesh(monitorGeo, monitorMat);
        monitor.position.set(0, 1, -4);
        scene.add(monitor);

        // 4. Setup Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 5. FPS Controls
        controls = new THREE.PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        
        blocker.addEventListener('click', function () { controls.lock(); });
        controls.addEventListener('lock', function () { blocker.style.display = 'none'; });
        controls.addEventListener('unlock', function () { blocker.style.display = 'flex'; });
        scene.add(controls.getObject());

        // Keyboard inputs
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
            // Press 'E' to interact/trigger scare
            if(e.code === 'KeyE') {
                triggerJumpscare();
            }
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        });

        window.addEventListener('resize', onWindowResize);
    }

    function triggerJumpscare() {
        // Simulating the lights going out and audio playing
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 0, 2); // Pitch black
        scaryAudio.play();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now();

        if (controls.isLocked === true) {
            const delta = (time - prevTime) / 1000;

            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize(); // Ensure consistent movement in all directions

            if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * delta;

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);

            // Head Bobbing (Camera Shake) effect while walking
            if (moveForward || moveBackward || moveLeft || moveRight) {
                headBobTimer += delta * 10;
                camera.position.y = 1.6 + Math.sin(headBobTimer) * 0.05;
            } else {
                camera.position.y = 1.6;
            }
        }
        prevTime = time;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
