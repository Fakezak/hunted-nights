<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NIGHT SHIFT: AWAKENING</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #blocker { position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; z-index: 10; transition: background-color 2s; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
        #loading-text { color: red; margin-top: 20px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="blocker">
    <h1>CLICK TO WAKE UP</h1>
    <div id="loading-text">Loading 3D Environment...</div>
</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let camera, scene, renderer, controls;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let prevTime = performance.now();
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    
    // Wake up animation variables
    let isWakingUp = false;
    let standUpProgress = 0;
    
    // Audio
    const scaryAudio = new Audio('I See You.mp3');

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.FogExp2(0x020202, 0.15); // Thick, creepy fog inside the room

        // Start camera low (laying in bed)
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 0.5; 

        // Lighting (Dim, spooky moonlight)
        const ambientLight = new THREE.AmbientLight(0x222233, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x445588, 1, 10);
        pointLight.position.set(0, 2, 0);
        scene.add(pointLight);

        // --- LOAD YOUR 3D FURNITURE/ROOM ---
        const loader = new THREE.GLTFLoader();
        
        // This looks for a file named "bedroom.glb" in your GitHub repository
        loader.load('bedroom.glb', function (gltf) {
            scene.add(gltf.scene);
            document.getElementById('loading-text').innerText = "Environment Loaded.";
        }, undefined, function (error) {
            console.error('Error loading model. Make sure bedroom.glb is in your GitHub repo!', error);
            document.getElementById('loading-text').innerText = "Missing bedroom.glb! Loading empty void.";
            
            // Backup floor if model fails
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
        });

        // Setup Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Controls
        controls = new THREE.PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        
        blocker.addEventListener('click', function () { 
            controls.lock(); 
        });
        
        controls.addEventListener('lock', function () { 
            blocker.style.display = 'none'; 
            if (!isWakingUp && camera.position.y < 1.0) {
                isWakingUp = true; // Trigger the stand-up animation once
            }
        });
        
        controls.addEventListener('unlock', function () { 
            blocker.style.display = 'flex'; 
        });
        
        scene.add(controls.getObject());

        // Movement Inputs
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
            if(e.code === 'KeyE') scaryAudio.play(); // Press E to trigger the voice
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        });

        window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now();
        const delta = (time - prevTime) / 1000;

        // The "Wake Up" Animation (standing up from the bed)
        if (isWakingUp && camera.position.y < 1.6) {
            standUpProgress += delta * 0.5;
            camera.position.y += standUpProgress * delta;
            if (camera.position.y >= 1.6) {
                camera.position.y = 1.6;
                isWakingUp = false;
            }
        }

        if (controls.isLocked === true && !isWakingUp) {
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 20.0 * delta; // Slower, heavier walking speed
            if (moveLeft || moveRight) velocity.x -= direction.x * 20.0 * delta;

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
        }
        
        prevTime = time;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
