<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NIGHT SHIFT: AWAKENING</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #blocker { position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; z-index: 10; transition: background-color 2s; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
        #loading-text { color: red; margin-top: 20px; animation: pulse 1s infinite alternate; }
        #controls-help { margin-top: 20px; color: #aaa; font-size: 0.9rem; text-align: center; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="blocker">
    <h1>CLICK TO WAKE UP</h1>
    <div id="loading-text">Loading 3D Environment...</div>
    <div id="controls-help">WASD: Move | MOUSE: Look | F: Flashlight | E: Trigger Scare</div>
</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let camera, scene, renderer, controls;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let prevTime = performance.now();
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    
    // Animation & Light variables
    let isWakingUp = false;
    let standUpProgress = 0;
    let flashlight;
    let flashlightOn = false;
    
    // Audio
    const scaryAudio = new Audio('I See You.mp3');

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010101); // Pitch black background
        scene.fog = new THREE.FogExp2(0x010101, 0.2); // Thicker fog so you can't see far without the light

        // Start camera low (laying in bed)
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 0.5; 

        // --- THE FLASHLIGHT SETUP ---
        // Color: white, Intensity: 2, Distance: 15, Angle: tight cone, Penumbra: soft edges
        flashlight = new THREE.SpotLight(0xffffff, 2, 15, Math.PI / 6, 0.5, 1);
        flashlight.position.set(0, 0, 0); 
        flashlight.visible = flashlightOn; // Starts off
        
        // A Spotlight needs a target to point at. We place the target slightly in front of the camera.
        camera.add(flashlight);
        camera.add(flashlight.target);
        flashlight.target.position.set(0, 0, -1);
        
        // We must add the camera to the scene for the attached lights to work
        scene.add(camera);

        // Very dim ambient lighting so the room isn't 100% black when the flashlight is off
        const ambientLight = new THREE.AmbientLight(0x111115, 0.2);
        scene.add(ambientLight);

        // --- LOAD YOUR 3D FURNITURE/ROOM ---
        const loader = new THREE.GLTFLoader();
        
        loader.load('bedroom.glb', function (gltf) {
            scene.add(gltf.scene);
            document.getElementById('loading-text').innerText = "Environment Loaded.";
        }, undefined, function (error) {
            console.error('Error loading model.', error);
            document.getElementById('loading-text').innerText = "Missing bedroom.glb! Loading empty void.";
            
            // Backup floor if model fails
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({color: 0x222222}));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
        });

        // Setup Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Controls
        controls = new THREE.PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        
        blocker.addEventListener('click', function () { 
            controls.lock(); 
        });
        
        controls.addEventListener('lock', function () { 
            blocker.style.display = 'none'; 
            if (!isWakingUp && camera.position.y < 1.0) {
                isWakingUp = true; 
            }
        });
        
        controls.addEventListener('unlock', function () { 
            blocker.style.display = 'flex'; 
        });
        
        scene.add(controls.getObject());

        // --- MOVEMENT & ACTION INPUTS ---
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
            
            // Press E to trigger the voice
            if(e.code === 'KeyE') scaryAudio.play(); 
            
            // Press F to toggle flashlight
            if(e.code === 'KeyF') {
                flashlightOn = !flashlightOn;
                flashlight.visible = flashlightOn;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        });

        window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now();
        const delta = (time - prevTime) / 1000;

        // The "Wake Up" Animation 
        if (isWakingUp && camera.position.y < 1.6) {
            standUpProgress += delta * 0.5;
            camera.position.y += standUpProgress * delta;
            if (camera.position.y >= 1.6) {
                camera.position.y = 1.6;
                isWakingUp = false;
            }
        }

        // Walking Logic
        if (controls.isLocked === true && !isWakingUp) {
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 20.0 * delta; 
            if (moveLeft || moveRight) velocity.x -= direction.x * 20.0 * delta;

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
        }
        
        prevTime = time;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
